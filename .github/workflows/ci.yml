name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Rust core: fmt + clippy + tests ────────────────────────────────────────
  rust:
    name: Rust tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all
        # Note: visual regression tests (622 golden bitmaps) run separately
        # in the 'visual-tests' job with --features visual-regression and
        # upload rendered output as downloadable artifacts.

  # ─── Visual tests: bitmap regression + rendered output as artifacts ─────────
  visual-tests:
    name: Visual tests + artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-visual-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-visual-

      - name: Run all tests with visual regression
        run: cargo test --all --features visual-regression -- --nocapture
        # Includes bitmap regression (622 golden PNGs) + MusicXML pipeline tests.
        # Pipeline tests produce PDFs and exported MusicXML in test-output/.

      - name: Run golden bitmap diff
        if: always()
        run: ./scripts/visual-review.sh --no-open

      - name: Upload test output (PDFs, MusicXML, diffs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-test-output
          path: test-output/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload golden bitmaps (current)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-bitmaps
          path: tests/golden_bitmaps/
          retention-days: 30
          if-no-files-found: warn

  # ─── Flutter: pub get + analyze + build linux ───────────────────────────────
  flutter:
    name: Flutter build (linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nightingale

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nightingale/rust/target
          key: ${{ runner.os }}-flutter-cargo-${{ hashFiles('nightingale/rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-flutter-cargo-

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('nightingale/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: flutter pub get
        run: flutter pub get

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.11.1

      - name: Cache FRB generated files
        uses: actions/cache@v4
        with:
          path: |
            nightingale/lib/src/rust/frb_generated*.dart
            nightingale/rust/src/frb_generated*.rs
          key: ${{ runner.os }}-frb-${{ hashFiles('nightingale/rust/src/api/*.rs', 'nightingale/flutter_rust_bridge.yaml') }}
          restore-keys: ${{ runner.os }}-frb-

      - name: Generate flutter_rust_bridge bindings
        run: flutter_rust_bridge_codegen generate

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test
        # Runs test/widget_test.dart: ScoreView + CMD_* constant checks.
        # No Rust bridge calls — tests use mock RenderCommandDto data only.

      - name: flutter build linux
        run: flutter build linux --release

  # ─── Flutter: test + build macOS ────────────────────────────────────────────
  flutter-macos:
    name: Flutter build (macos)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: nightingale

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nightingale/rust/target
          key: ${{ runner.os }}-flutter-cargo-${{ hashFiles('nightingale/rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-flutter-cargo-

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('nightingale/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-cocoapods-${{ hashFiles('nightingale/macos/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-cocoapods-

      - name: flutter pub get
        run: flutter pub get

      - name: Install flutter_rust_bridge_codegen
        run: cargo install flutter_rust_bridge_codegen --version 2.11.1

      - name: Cache FRB generated files
        uses: actions/cache@v4
        with:
          path: |
            nightingale/lib/src/rust/frb_generated*.dart
            nightingale/rust/src/frb_generated*.rs
          key: ${{ runner.os }}-frb-${{ hashFiles('nightingale/rust/src/api/*.rs', 'nightingale/flutter_rust_bridge.yaml') }}
          restore-keys: ${{ runner.os }}-frb-

      - name: Generate flutter_rust_bridge bindings
        run: flutter_rust_bridge_codegen generate

      - name: flutter test
        run: flutter test
        # Runs test/widget_test.dart: ScoreView + CMD_* constant checks.
        # No Rust bridge calls — tests use mock RenderCommandDto data only.

      - name: flutter build macos
        run: flutter build macos --release
