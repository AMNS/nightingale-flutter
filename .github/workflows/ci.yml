name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Rust core: fmt + clippy + tests ────────────────────────────────────────
  rust:
    name: Rust tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --all
        # Note: visual regression tests (491 golden bitmaps) are gated behind
        # --features visual-regression and are intentionally skipped in CI.
        # Run locally with: cargo test --features visual-regression

  # ─── Flutter: pub get + analyze (platform-agnostic) ────────────────────────
  flutter:
    name: Flutter analyze
    runs-on: ubuntu-latest
    # Note: flutter build <platform> requires native toolchains (Xcode for macOS,
    # etc.) and is intentionally omitted here. Run locally for native builds.
    defaults:
      run:
        working-directory: nightingale

    steps:
      - uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('nightingale/pubspec.lock') }}
          restore-keys: ${{ runner.os }}-pub-

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze
        # Confirms Dart code compiles, types check, and the pubspec dependency
        # graph is consistent — without requiring a native build toolchain.
